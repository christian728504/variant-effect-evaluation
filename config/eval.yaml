# Declarative benchmark matrix + cluster parameters, validated by
# variant_effect_evaluation.config. Paths are repo-relative (project_root = this file's
# parent's parent); the logic that consumes them lives in variant_effect_evaluation.utils.

paths:
  data_dir: data
  results_dir: results
  logs_dir: logs
  qtl_subdir: qtl                # under data_dir
  weights_subdir: weights        # under data_dir
  references_subdir: references   # under data_dir
  # genome build -> FASTA under references_subdir (UCSC chr1-named, bgzip + faidx
  # indexed); a dataset selects its build via genome_build.
  ref_fastas:
    hg38: hg38/hg38.fa.gz
    hg19: hg19/hg19.fa.gz

# Per-model construction conventions read by utils.build_scorer.
models:
  # BPNet-like weight dirs (chrombpnet + cherimoya share this layout), keyed by
  # pseudo-accession, under <weights>/<model>/ (AFGR pops under afgr/<Cap>). ENCODE
  # accessions are absent and map to themselves.
  celltype_dirs:
    microglia: microglia
    esan: afgr/Esan
    gambian: afgr/Gambian
    luhya: afgr/Luhya
    maasai: afgr/Maasai
    mende: afgr/Mende
    yoruba: afgr/Yoruba
  # Long sequences make many-tracks activations huge; cap batch even on a 140 GB H200.
  many_tracks_batch:
    enformer: 2
    borzoi: 2
    alphagenome: 1
  # Per-model base dir under <weights>/. BPNet-like models append a per-accession leaf
  # (celltype_dirs) holding fold_{i}.torch; alphagenome points at its safetensors file.
  weights_subdirs:
    chrombpnet: chrombpnet
    cherimoya: cherimoya
    enformer: enformer-pytorch
    borzoi: borzoi-pytorch
    alphagenome: alphagenome-pytorch/model_all_folds.safetensors

# Benchmark datasets. Each `plan` lists every (model, accession, assay) job scoring the
# dataset. BPNet-like + AlphaGenome use the assay-matched (ATAC) accession; Enformer/Borzoi
# lack an ATAC track and use the DNase accession as a proxy. African caQTLs additionally
# get the 6 AFGR ChromBPNet + Cherimoya models.
datasets:
  caqtls_eu:
    key: caqtls_eu
    filename: caqtls.eu.lcls.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg38
    allele1_col: var.allele1
    allele2_col: var.allele2
    effect_size_col: obs.beta
    pvalue_col: obs.pval
    isused_col: var.isused
    source_assay: ATAC
    genome_build: hg38
    significance_neglog10p: 6.0
    notes: "European LCL ATAC caQTLs; significant = -log10(p)>6."
    plan:
      - {model: chrombpnet,  accession: ENCSR637XSC, assay: ATAC}
      - {model: cherimoya,   accession: ENCSR637XSC, assay: ATAC}
      - {model: alphagenome, accession: ENCSR637XSC, assay: ATAC}
      - {model: chrombpnet,  accession: ENCSR000EMT, assay: DNASE}
      - {model: cherimoya,   accession: ENCSR000EMT, assay: DNASE}
      - {model: alphagenome, accession: ENCSR000EMT, assay: DNASE}
      - {model: enformer,    accession: ENCSR000EMT, assay: DNASE}
      - {model: borzoi,      accession: ENCSR000EMT, assay: DNASE}

  caqtls_african:
    key: caqtls_african
    filename: caqtls.african.lcls.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg38
    allele1_col: var.allele1
    allele2_col: var.allele2
    effect_size_col: obs.beta
    pvalue_col: obs.pval
    isused_col: var.isused
    source_assay: ATAC
    genome_build: hg38
    significance_neglog10p: 5.0
    notes: "African LCL ATAC caQTLs; significant = -log10(p)>5."
    plan:
      - {model: chrombpnet,  accession: ENCSR637XSC, assay: ATAC}
      - {model: cherimoya,   accession: ENCSR637XSC, assay: ATAC}
      - {model: alphagenome, accession: ENCSR637XSC, assay: ATAC}
      - {model: chrombpnet,  accession: ENCSR000EMT, assay: DNASE}
      - {model: cherimoya,   accession: ENCSR000EMT, assay: DNASE}
      - {model: alphagenome, accession: ENCSR000EMT, assay: DNASE}
      - {model: enformer,    accession: ENCSR000EMT, assay: DNASE}
      - {model: borzoi,      accession: ENCSR000EMT, assay: DNASE}
      - {model: chrombpnet,  accession: esan,    assay: ATAC}
      - {model: chrombpnet,  accession: gambian, assay: ATAC}
      - {model: chrombpnet,  accession: luhya,   assay: ATAC}
      - {model: chrombpnet,  accession: maasai,  assay: ATAC}
      - {model: chrombpnet,  accession: mende,   assay: ATAC}
      - {model: chrombpnet,  accession: yoruba,  assay: ATAC}
      - {model: cherimoya,   accession: esan,    assay: ATAC}
      - {model: cherimoya,   accession: gambian, assay: ATAC}
      - {model: cherimoya,   accession: luhya,   assay: ATAC}
      - {model: cherimoya,   accession: maasai,  assay: ATAC}
      - {model: cherimoya,   accession: mende,   assay: ATAC}
      - {model: cherimoya,   accession: yoruba,  assay: ATAC}

  asb_african:
    key: asb_african
    filename: caqtls.african.lcls.asb.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg38
    allele1_col: allele1   # ASB file drops the var. prefix on alleles
    allele2_col: allele2
    effect_size_col: obs.meanLog2FC
    pvalue_col: null
    isused_col: var.isused
    source_assay: ATAC
    genome_build: hg38
    significance_neglog10p: null   # all rows already significant ASB sites
    notes: "African LCL allele-specific binding; all rows pre-significant."
    plan:
      - {model: chrombpnet,  accession: ENCSR637XSC, assay: ATAC}
      - {model: cherimoya,   accession: ENCSR637XSC, assay: ATAC}
      - {model: alphagenome, accession: ENCSR637XSC, assay: ATAC}
      - {model: chrombpnet,  accession: ENCSR000EMT, assay: DNASE}
      - {model: cherimoya,   accession: ENCSR000EMT, assay: DNASE}
      - {model: alphagenome, accession: ENCSR000EMT, assay: DNASE}
      - {model: enformer,    accession: ENCSR000EMT, assay: DNASE}
      - {model: borzoi,      accession: ENCSR000EMT, assay: DNASE}

  caqtls_microglia:
    key: caqtls_microglia
    filename: caqtls.microglia.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg38
    # obs.Beta is signed in the var.allele1 direction (opposite of the caQTL LCL
    # obs.beta convention), so allele1/allele2 are swapped — same flip as
    # dsqtls_yoruba. Matches the file's published logFC + the paper's r=0.6
    # (Fig. 6j): signed corr is +0.60, not -0.60.
    allele1_col: var.allele2
    allele2_col: var.allele1
    effect_size_col: obs.Beta
    pvalue_col: obs.Z_score_fixed
    isused_col: var.isused
    source_assay: scATAC
    genome_build: hg38
    significance_neglog10p: null   # all rows already significant caQTLs
    notes: "Microglia scATAC caQTLs; all rows pre-significant; BPNet-like only."
    plan:
      - {model: chrombpnet, accession: microglia, assay: null}
      - {model: cherimoya,  accession: microglia, assay: null}

  # dsQTL/bQTL are GM12878 LCL datasets (hg19) — same biosample as caqtls_eu, so
  # the same 8-model plan applies (ATAC ENCSR637XSC + DNase ENCSR000EMT).
  dsqtls_yoruba:
    key: dsqtls_yoruba
    filename: dsqtls.yoruba.lcls.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg19
    # obs.estimate is signed in the var.allele1 direction (opposite of the caQTL
    # obs.beta convention), so allele1/allele2 are swapped to match the pipeline's
    # logFC=log2(allele2/allele1): with var.allele2 as the ref-like allele, signed
    # corr matches the file's published logFC (+0.75, not -0.75).
    allele1_col: var.allele2
    allele2_col: var.allele1
    effect_size_col: obs.estimate
    pvalue_col: null
    isused_col: var.isused
    source_assay: DNASE
    genome_build: hg19
    significance_label_col: obs.label   # 1 = significant, -1 = control
    notes: "Yoruban LCL dsQTLs (hg19); significant = obs.label==1 (~560 positives)."
    plan:
      - {model: chrombpnet,  accession: ENCSR637XSC, assay: ATAC}
      - {model: cherimoya,   accession: ENCSR637XSC, assay: ATAC}
      - {model: alphagenome, accession: ENCSR637XSC, assay: ATAC}
      - {model: chrombpnet,  accession: ENCSR000EMT, assay: DNASE}
      - {model: cherimoya,   accession: ENCSR000EMT, assay: DNASE}
      - {model: alphagenome, accession: ENCSR000EMT, assay: DNASE}
      - {model: enformer,    accession: ENCSR000EMT, assay: DNASE}
      - {model: borzoi,      accession: ENCSR000EMT, assay: DNASE}

  bqtls_pu1:
    key: bqtls_pu1
    filename: bqtls.pu1.lcls.benchmarking.all.tsv
    chrom_col: var.chr
    pos_col: var.pos_hg19
    allele1_col: var.POSTallele   # POST = reference-like allele
    allele2_col: var.ALTallele
    effect_size_col: obs.chiplogratio
    pvalue_col: obs.pval
    isused_col: var.isused
    source_assay: ATAC
    genome_build: hg19
    significance_neglog10p: 4.0
    notes: "PU1/SPI1 bQTLs (hg19); significant = -log10(obs.pval)>4."
    plan:
      - {model: chrombpnet,  accession: ENCSR637XSC, assay: ATAC}
      - {model: cherimoya,   accession: ENCSR637XSC, assay: ATAC}
      - {model: alphagenome, accession: ENCSR637XSC, assay: ATAC}
      - {model: chrombpnet,  accession: ENCSR000EMT, assay: DNASE}
      - {model: cherimoya,   accession: ENCSR000EMT, assay: DNASE}
      - {model: alphagenome, accession: ENCSR000EMT, assay: DNASE}
      - {model: enformer,    accession: ENCSR000EMT, assay: DNASE}
      - {model: borzoi,      accession: ENCSR000EMT, assay: DNASE}

# Cluster / SlurmExecutor parameters. gpuh200 = 8 H200 / 256 CPU / 1 TB on one node,
# so one GPU's fair share is 32 CPU + 125 GB.
cluster:
  venv_python: ".venv/bin/python"   # repo-relative; resolved against project_root
  slurm:
    partition: gpuh200
    gres: "gpu:1"
    cpus_per_task: 32
    mem: "125000MB"          # string — SLURM needs the unit suffix
    time_min: 720            # 12 h; ample for the slowest run, << 14-day cap
    array_parallelism: 8     # use all 8 GPUs
    job_name: vep_bench
